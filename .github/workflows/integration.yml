name: Integration

on:
  pull_request:
    branches: [main]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'examples/**'
      - 'scripts/emu/**'
      - '.github/workflows/integration.yml'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

# Runner setup is machine-local (see scripts/emu/runner-setup.md):
#   /etc/wrtbox-openrc.sh  — OpenStack credentials for the emu cloud
#   /etc/wrtbox-emu.env    — EMU_* tunables (network id, key path, etc.)
#   ~/.ssh/wrtbox-emu      — SSH key accepted by the baked OpenWrt image

concurrency:
  group: integration
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  integration:
    runs-on: [self-hosted, linux, x64, emu]
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Boot emu VM
        run: |
          set -eo pipefail
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          bash scripts/emu/emu.sh up >/dev/null

      - name: Wait for emu SSH
        run: |
          set -eo pipefail
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          IP=$(bash scripts/emu/emu.sh ip | tr -d '[:space:]')
          for _ in $(seq 1 36); do
            if ssh -i "$EMU_PRIVKEY_FILE" \
                 -o StrictHostKeyChecking=accept-new \
                 -o UserKnownHostsFile="$HOME/.ssh/known_hosts_wrtbox" \
                 -o ConnectTimeout=3 \
                 -o LogLevel=ERROR \
                 "root@$IP" true 2>/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "emu SSH never came up" >&2
          exit 1

      - name: Prepare emu (sftp + real xray-core)
        env:
          XRAY_VERSION: v26.3.27
        run: |
          set -eo pipefail
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          IP=$(bash scripts/emu/emu.sh ip | tr -d '[:space:]')

          # Fetch real xray binary on the runner (OpenWrt has no unzip by default).
          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK"' EXIT
          curl -fsSL -o "$WORK/xray.zip" \
            "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          unzip -q "$WORK/xray.zip" -d "$WORK" xray
          chmod +x "$WORK/xray"

          SSH_OPTS=(-i "$EMU_PRIVKEY_FILE"
                    -o UserKnownHostsFile=$HOME/.ssh/known_hosts_wrtbox
                    -o StrictHostKeyChecking=accept-new
                    -o LogLevel=ERROR)

          # openssh-sftp-server is required by wrtbox's SFTP upload path.
          ssh "${SSH_OPTS[@]}" "root@$IP" 'set -e
            opkg update >/dev/null 2>&1
            opkg install openssh-sftp-server >/dev/null
          '

          # Ship real xray to /usr/bin/xray. No init.d/xray on purpose:
          # post-check asserts pidof xray, which we want to FAIL so the
          # rollback path is exercised in this integration test.
          scp "${SSH_OPTS[@]}" "$WORK/xray" "root@$IP:/usr/bin/xray"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'chmod +x /usr/bin/xray && xray version | head -1'

      - name: Run integration tests
        id: inttest
        run: |
          set -eo pipefail
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          WRTBOX_EMU_HOST=$(bash scripts/emu/emu.sh ip | tr -d '[:space:]')
          export WRTBOX_EMU_HOST
          export WRTBOX_EMU_KEY="$EMU_PRIVKEY_FILE"
          export WRTBOX_EMU_USER=root
          go test -tags=integration -count=1 -timeout=10m -v ./internal/apply/...

      - name: Diagnostics on failure
        if: failure() && steps.inttest.conclusion == 'failure'
        run: |
          set +e
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          IP=$(bash scripts/emu/emu.sh ip | tr -d '[:space:]')
          SSH_OPTS=(-i "$EMU_PRIVKEY_FILE"
                    -o UserKnownHostsFile=$HOME/.ssh/known_hosts_wrtbox
                    -o StrictHostKeyChecking=accept-new
                    -o LogLevel=ERROR)
          echo "::group::xray --help"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'xray --help 2>&1 | head -40'
          echo "::endgroup::"
          echo "::group::xray run --help"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'xray run --help 2>&1 | head -40'
          echo "::endgroup::"
          echo "::group::staging configs"
          ssh "${SSH_OPTS[@]}" "root@$IP" 'ls -R /root/wrtbox-staging 2>&1 | head -40'
          echo "::endgroup::"
          echo "::group::xray test against the staged config"
          ssh "${SSH_OPTS[@]}" "root@$IP" '
            STAGED=$(ls -d /root/wrtbox-staging/*/etc/xray/config.json 2>/dev/null | head -1)
            echo "staged: $STAGED"
            echo "---try 1: xray run -test -c---"
            xray run -test -c "$STAGED"; echo "exit=$?"
            echo "---try 2: xray -test -config---"
            xray -test -config "$STAGED"; echo "exit=$?"
            echo "---try 3: xray -test -c---"
            xray -test -c "$STAGED"; echo "exit=$?"
          '
          echo "::endgroup::"

      - name: Tear down emu VM
        if: always()
        run: |
          set +e
          . /etc/wrtbox-openrc.sh >/dev/null 2>&1
          . /etc/wrtbox-emu.env
          bash scripts/emu/emu.sh down >/dev/null 2>&1 || true
