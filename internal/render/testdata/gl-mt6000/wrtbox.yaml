apiVersion: wrtbox/v1
kind: Router
metadata:
  name: gl-mt6000-testdata

spec:
  device:
    model: gl-mt6000

  network:
    lan:
      ipaddr: 192.168.1.1/24
      ports: [lan1, lan2, lan3, lan4, lan5]
    wan:
      proto: pppoe
      device: eth1
      username: testuser
      password: testpass
      dns: [1.1.1.1, 1.0.0.1, 8.8.8.8, 9.9.9.9]

  wireless:
    country: RU
    radios:
      - { name: radio0, band: 2g, htmode: HE20 }
      - { name: radio1, band: 5g, htmode: HE80 }
    ssids:
      - { radio: radio0, network: lan,    ssid: test-home,  encryption: psk2, password: abcd1234 }
      - { radio: radio1, network: lan,    ssid: test-home,  encryption: psk2, password: abcd1234 }
      - { radio: radio1, network: vpnlan, ssid: test-proxy, encryption: psk2, password: abcd1234 }

  vpnlan:
    ipaddr: 192.168.10.1/24

  transport:
    xray:
      reality:
        server: vpn.test.example.com
        port: 443
        uuid: 11111111-2222-3333-4444-555555555555
        server_name: www.microsoft.com
        public_key: 3WmS7tERswgfK1ABS-17QgksuPejtDE50fQvK-3vZAw
        short_id: 02e1d30bba8b61d9

  routing:
    profile: split
    block_quic: true
    force_via_vpn:
      - ip:74.125.0.0/16
      - ip:91.108.0.0/16
      - domain:youtube.com
      - domain:telegram.org
    force_direct:
      - geosite:category-ru
      - geoip:ru
      - geoip:private
    block:
      - geosite:category-ads-all
      - domain:doubleclick.net
    lists:
      - name: antifilter
        source: embed:antifilter-ipsum
        outbound_tag: vless-out
        kind: cidr
