#!/usr/sbin/nft -f

flush table inet xray

table inet xray {
    set private_ipv4 {
        type ipv4_addr
        flags interval
        elements = {
            0.0.0.0/8,
            10.0.0.0/8,
            100.64.0.0/10,
            127.0.0.0/8,
            169.254.0.0/16,
            172.16.0.0/12,
            192.0.0.0/24,
            192.168.0.0/16,
            224.0.0.0/4,
            240.0.0.0/4
        }
    }

    chain prerouting {
        type filter hook prerouting priority mangle; policy accept;
        ip daddr @private_ipv4 return
        meta l4proto { tcp, udp } th dport 53 meta mark set 1 tproxy to :12345 accept
        meta l4proto { tcp, udp } meta mark set 1 tproxy to :12345 accept
    }

    chain output {
        type route hook output priority mangle; policy accept;
        meta mark 0xff return
    }
}
