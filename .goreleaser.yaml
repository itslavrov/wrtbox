version: 2

project_name: wrtbox

before:
  hooks:
    - go mod tidy

builds:
  - id: wrtbox
    main: ./cmd/wrtbox
    binary: wrtbox
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/itslavrov/wrtbox/internal/version.Version={{ .Version }}
      - -X github.com/itslavrov/wrtbox/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/itslavrov/wrtbox/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - wrtbox
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

nfpms:
  - id: wrtbox
    package_name: wrtbox
    ids:
      - wrtbox
    vendor: itslavrov
    homepage: https://github.com/itslavrov/wrtbox
    maintainer: itslavrov <itslavrov.vkteam@gmail.com>
    description: |-
      Declarative OpenWrt: one YAML file, atomic apply, auto-rollback.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: net
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

brews:
  - name: wrtbox
    ids:
      - default
    repository:
      owner: itslavrov
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/itslavrov/wrtbox
    description: Declarative OpenWrt — one YAML file, atomic apply, auto-rollback.
    license: MIT
    commit_author:
      name: itslavrov
      email: itslavrov@me.com
    install: |
      bin.install "wrtbox"
    test: |
      system "#{bin}/wrtbox", "--version"

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: itslavrov
    name: wrtbox
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
  header: |
    ## wrtbox {{ .Tag }}
